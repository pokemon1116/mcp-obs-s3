name: AI Code Review (Zhipu GLM)

# PR 自动拉起智谱 GLM 做 AI 代码审查。
# 前置: 在仓库 Settings → Secrets and variables → Actions 添加
#       ZHIPUAI_API_KEY (智谱 API Key, 在 open.bigmodel.cn 申请)。
# 可选: 仓库 Variables 里设置 ZHIPU_MODEL (默认 glm-4.6) / ZHIPU_BASE_URL。
# 智谱接口与 OpenAI SDK 兼容: https://open.bigmodel.cn/api/paas/v4

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  glm-review:
    # 仅本仓库触发(fork 没有 key, 会浪费额度); 跳过 draft PR
    if: github.repository == 'pokemon1116/mcp-obs-s3' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
      ZHIPU_BASE_URL: ${{ vars.ZHIPU_BASE_URL || 'https://open.bigmodel.cn/api/paas/v4' }}
      ZHIPU_MODEL: ${{ vars.ZHIPU_MODEL || 'glm-4.6' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 完整历史, 便于取 base..head diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gather PR diff
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # 截断到 ~60KB, 避免超出模型上下文
          git diff --no-color "${BASE}...${HEAD}" | head -c 60000 > pr.diff
          echo "diff_bytes=$(wc -c < pr.diff)" >> "$GITHUB_STEP_SUMMARY"

      - name: Run GLM code review
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          DIFF_FILE: pr.diff
        run: node .github/scripts/glm-review.mjs review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -s review.md ]; then
            gh pr comment "$PR_NUMBER" --body-file review.md
          else
            echo "无审查内容, 跳过评论。"
          fi
